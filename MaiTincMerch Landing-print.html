<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MaiTincMerch! — Merchandising 360º para artistas (Print)</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Anton&family=Bebas+Neue&family=Boldonse&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />

<style>
  /* === PRINT-ONLY OVERRIDES === */
  html, body {
    background: #0A0A0A !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
    overflow: visible !important;
    cursor: auto !important;
  }
  * { cursor: auto !important; }

  /* Force reveal animations to show */
  .reveal { opacity: 1 !important; transform: none !important; }

  /* Kill custom cursor + tweaks panel in print */
  .cursor, .cursor-dot, .twk-panel { display: none !important; }

  /* Nav: not fixed, so it doesn't overlap each page */
  .nav {
    position: absolute !important;
    mix-blend-mode: normal !important;
    background: transparent !important;
  }

  /* Ensure horizontal festival track is fully visible (no scroll) */
  .festivals-track {
    flex-wrap: wrap !important;
    overflow: visible !important;
    gap: 16px !important;
    justify-content: flex-start;
  }
  .fest-card {
    flex: 0 0 calc(33% - 16px) !important;
    height: 360px !important;
  }
  .festivals-nav { display: none !important; }

  /* Hide ticker (animated marquee, doesn't print well) */
  .ticker { display: none !important; }

  /* Hide scroll cue */
  .scroll-cue { display: none !important; }

  /* Hero shrink so it fits a page nicely */
  .hero { min-height: auto !important; padding: 120px 36px 60px !important; }
  .hero-bg { position: absolute !important; height: 100% !important; }

  /* Artist preview is fixed/floating — hide */
  .artist-preview { display: none !important; }

  /* Disable all animations / transitions in print */
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }
  .hero-title .word > span { transform: none !important; }

  /* Print page setup */
  @page {
    size: A4 portrait;
    margin: 0;
    background: #0A0A0A;
  }

  @media print {
    body { margin: 0; }

    /* Avoid splitting key blocks across pages */
    .hero, .section, .artists, .festivals, .contact, .footer {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .section, .artists, .festivals, .contact, .footer {
      break-before: page;
      page-break-before: always;
    }
    .svc, .prod-card, .fest-card, .artist-row, .process-step, .field {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* The grain noise / vignette: keep but lighter */
    .noise { opacity: 0.04 !important; }
  }

  /* On-screen preview: stack pages so user sees what'll print */
  @media screen {
    body { background: #555; padding: 20px 0; }
    #root { background: #0A0A0A; max-width: 794px; margin: 0 auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="nav.jsx"></script>
<script type="text/babel" src="ticker.jsx"></script>
<script type="text/babel" src="hero.jsx"></script>
<script type="text/babel" src="solution.jsx"></script>
<script type="text/babel" src="artists.jsx"></script>
<script type="text/babel" src="production.jsx"></script>
<script type="text/babel" src="festivals.jsx"></script>
<script type="text/babel" src="process.jsx"></script>
<script type="text/babel" src="contact.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
  // Wait for fonts + React render + a safety delay, then auto-print.
  (async () => {
    try { if (document.fonts && document.fonts.ready) { await document.fonts.ready; } } catch (e) {}
    // Wait for React to mount + reveal observers to fire
    await new Promise(r => setTimeout(r, 1500));
    // Force all reveal elements to "in" so nothing remains faded out
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
    await new Promise(r => setTimeout(r, 300));
    window.print();
  })();
</script>
</body>
</html>
